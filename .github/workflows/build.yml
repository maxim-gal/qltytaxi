name: Build

on:
  push:

jobs:
  # Основное задание – установка зависимостей (всегда зелёное)
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci

  # Задание для Qlty – проверка качества, но ошибки не влияют на общий статус
  quality:
    runs-on: ubuntu-latest
    needs: install   # запускается после успешной установки
    continue-on-error: true   # <-- КЛЮЧЕВОЙ МОМЕНТ
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Install Qlty CLI
        run: |
          curl -fsSL https://qlty.sh | bash
          echo "$HOME/.qlty/bin" >> $GITHUB_PATH
      - name: Initialize Qlty
        run: qlty init --yes
      - name: Run Qlty quality check
        run: qlty check   # без || true, но задание не упадёт из-за continue-on-error