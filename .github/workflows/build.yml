name: Build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # Если есть тесты, можно добавить их сюда:
      # - name: Run tests
      #   run: npm test

      - name: Install Qlty CLI
        run: curl -fsSL https://qlty.sh | bash

      - name: Run Qlty quality check
        run: qlty check