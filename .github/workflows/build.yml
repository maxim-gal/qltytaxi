name: Build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      # Устанавливаем Qlty CLI и добавляем его в PATH
      - name: Install Qlty CLI
        run: |
          curl -fsSL https://qlty.sh | bash
          echo "$HOME/.qlty/bin" >> $GITHUB_PATH

      # Теперь qlty должен быть доступен
      - name: Run Qlty quality check
        run: qlty check